<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora do Quiz!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: block;
            border: 2px solid transparent;
        }

        .btn-info {
            background-color: #4facfe;
            background-image: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
        }

        .btn-ingles {
            background-color: #f093fb;
            background-image: linear-gradient(to right, #f093fb 0%, #f5576c 100%);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Desafio do Conhecimento</h1>
        <p>Olá, aluno! Prepare-se para testar suas habilidades. Qual quiz você deseja encarar hoje?</p>
        
        <div class="button-group">
            <a href="info.html" class="btn btn-info">💻 Quiz de Informática</a>
            <a href="ingles.html" class="btn btn-ingles">🔤 Quiz de Inglês</a>
        </div>
    </div>

</body>
</html>
