<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Técnico - SEDUC/PI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #quiz-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .header { border-bottom: 2px solid #0056b3; margin-bottom: 1.5rem; padding-bottom: 0.5rem; }
        .question { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; color: #333; }
        .code-block { background: #272822; color: #f8f8f2; padding: 1rem; border-radius: 6px; font-family: 'Courier New', Courier, monospace; margin-bottom: 1rem; overflow-x: auto; font-size: 0.9rem; }
        .options { display: grid; gap: 0.8rem; }
        .option-btn { background: #fff; border: 2px solid #ddd; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; transition: all 0.2s; font-size: 1rem; }
        .option-btn:hover { border-color: #0056b3; background-color: #f0f7ff; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; }
        .incorrect { background-color: #f8d7da !important; border-color: #dc3545 !important; }
        .footer { margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        #next-btn { background: #0056b3; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; display: none; }
        #next-btn:hover { background: #004494; }
        .score { font-weight: bold; color: #555; }
        #result-screen { text-align: center; display: none; }
        .share-btn { background: #25d366; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 1rem; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="game-screen">
        <div class="header">
            <span id="progress">Questão 1 de 20</span>
        </div>
        <div id="question-area">
            <div class="question" id="q-text"></div>
            <div id="q-code"></div>
        </div>
        <div class="options" id="options-container"></div>
        <div class="footer">
            <div class="score">Acertos: <span id="current-score">0</span></div>
            <button id="next-btn" onclick="nextQuestion()">Avançar →</button>
        </div>
    </div>

    <div id="result-screen">
        <h2>Simulado Concluído!</h2>
        <p style="font-size: 1.5rem;">Sua pontuação: <span id="final-score">0</span>/20</p>
        <div id="feedback"></div>
        <button class="share-btn" onclick="shareResults()">Compartilhar no WhatsApp</button>
        <button onclick="location.reload()" style="margin-top:10px; display:block; width:100%; padding:10px; cursor:pointer;">Reiniciar Quiz</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Sobre o MOODLE, é correto afirmar que se trata de uma plataforma de:", options: ["Código Fechado", "Código Aberto (Open Source)", "Uso restrito a empresas", "Hardware Livre", "Sistema Operacional"], correct: 1 },
        { q: "Qual ferramenta do MOODLE é mais indicada para o envio de arquivos de trabalhos para correção?", options: ["Chat", "Glossário", "Tarefa", "Fórum", "Livro"], correct: 2 },
        { q: "No contexto da TI Verde, a virtualização de servidores ajuda a:", options: ["Aumentar o consumo de papel", "Reduzir o número de equipamentos físicos ligados", "Descartar lixo eletrônico no lixo comum", "Aumentar a obsolescência programada", "Nenhuma das anteriores"], correct: 1 },
        { q: "Qual o índice do primeiro elemento de um vetor (array) em linguagens como JavaScript e Python?", options: ["1", "-1", "0", "10", "Null"], correct: 2 },
        { q: "Analise o código Portugol Studio e diga qual o valor final de 'x':", code: "inteiro x = 10\nse (x > 5) { x = x + 2 }\nsenao { x = x - 2 }", options: ["8", "10", "12", "5", "0"], correct: 2 },
        { q: "Em Python, qual o resultado do código abaixo?", code: "print(10 > 5 and 3 == 4)", options: ["True", "False", "Error", "None", "1"], correct: 1 },
        { q: "Qual ferramenta MOODLE permite discussões assíncronas entre alunos e professores?", options: ["Chat", "Wiki", "Fórum", "Pesquisa", "URL"], correct: 2 },
        { q: "O conceito de 'Reciclar' na informática refere-se a:", options: ["Doar o PC antigo", "Reprocessar materiais para criar novos", "Diminuir o uso de energia", "Imprimir frente e verso", "Vender peças usadas"], correct: 1 },
        { q: "No JavaScript, qual o resultado de: console.log('5' + 5)?", options: ["10", "55", "Error", "NaN", "5.5"], correct: 1 },
        { q: "Qual comando no Portugol Studio é usado para receber dados do teclado?", options: ["escreva()", "leia()", "imprima()", "input()", "get()"], correct: 1 },
        { q: "O que significa a sigla EAD?", options: ["Educação de Adultos", "Ensino a Distância", "Escola de Artes Digitais", "Educação Ambiental Direta", "Estatística de Dados"], correct: 1 },
        { q: "Qual dessas é uma estrutura de repetição em Lógica de Programação?", options: ["SE", "ESCOLHA", "ENQUANTO", "SENAO", "VAR"], correct: 2 },
        { q: "Na Educação Ambiental, o que representa o 'R' de Reutilizar?", options: ["Dar novo uso a um objeto antes de descartar", "Transformar plástico em matéria-prima", "Comprar menos eletrônicos", "Desligar o monitor", "Trocar o HD por um SSD"], correct: 0 },
        { q: "Em Python, como se declara uma lista?", options: ["lista = (1, 2)", "lista = {1, 2}", "lista = [1, 2]", "lista = <1, 2>", "lista = 1, 2"], correct: 2 },
        { q: "Uma matriz 3x3 possui quantos elementos no total?", options: ["3", "6", "9", "12", "1"], correct: 2 },
        { q: "No MOODLE, quem é o responsável por mediar e tirar dúvidas dos alunos?", options: ["Professor Autor", "Diretor", "Tutor/Mediador", "Web Designer", "Estudante"], correct: 2 },
        { q: "Qual o tipo de dado para armazenar o valor 7.5 no Portugol?", options: ["inteiro", "cadeia", "caracter", "real", "logico"], correct: 3 },
        { q: "No JavaScript, 'let' e 'const' são usados para declarar:", options: ["Funções", "Variáveis e Constantes", "Loops", "Condicionais", "Tags HTML"], correct: 1 },
        { q: "O impacto ambiental da TI é agravado pela 'Obsolescência Programada', que é:", options: ["Produtos feitos para durar para sempre", "Produtos feitos com vida útil curta propositalmente", "Reciclagem obrigatória", "Uso de software livre", "Economia de energia"], correct: 1 },
        { q: "Verdadeiro ou Falso: No Portugol, o comando 'limpa()' apaga o que está na tela do console.", options: ["Verdadeiro", "Falso"], correct: 0 }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
        answered = false;
        const q = questions[currentIdx];
        document.getElementById('progress').innerText = `Questão ${currentIdx + 1} de ${questions.length}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('next-btn').style.display = 'none';
        
        const codeArea = document.getElementById('q-code');
        codeArea.innerHTML = q.code ? `<div class="code-block">${q.code}</div>` : '';

        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = '';
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `${String.fromCharCode(65 + index)}) ${opt}`;
            btn.onclick = () => checkAnswer(index, btn);
            optContainer.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        if (answered) return;
        answered = true;
        const correct = questions[currentIdx].correct;
        const allBtns = document.querySelectorAll('.option-btn');
        
        if (idx === correct) {
            btn.classList.add('correct');
            score++;
            document.getElementById('current-score').innerText = score;
        } else {
            btn.classList.add('incorrect');
            allBtns[correct].classList.add('correct');
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        const feedback = score >= 14 ? "Excelente desempenho! Você está pronto para o concurso." : "Bom esforço! Continue revisando os pontos fracos.";
        document.getElementById('feedback').innerText = feedback;
    }

    function shareResults() {
        const text = `Fiz o Simulado SEDUC/PI de TI e acertei ${score} de 20 questões! Tente você também.`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    }

    loadQuestion();
</script>

</body>
</html>
